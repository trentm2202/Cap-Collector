<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#18100a"/>
<title>Cap Collector</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Courier New',Courier,monospace;font-size:14px;background:#f7f2e8;color:#18100a;overscroll-behavior:none;}
button{font-family:'Courier New',Courier,monospace;cursor:pointer;border:none;outline:none;}
button:active{opacity:0.8;}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}

/* HEADER */
#header{background:#18100a;color:#f7f2e8;padding:12px 16px;border-bottom:3px solid #b02818;position:sticky;top:0;z-index:50;}
#header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
#title{font-size:16px;font-weight:bold;letter-spacing:3px;color:#f5e8c0;}
#phase-name{font-size:10px;color:#b8a070;letter-spacing:1px;margin-top:2px;}
#header-btns{display:flex;gap:6px;}
.hbtn{background:transparent;border:1px solid #8a7a62;color:#8a7a62;padding:4px 10px;font-size:11px;}
#stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat-box{background:rgba(255,255,255,0.06);padding:7px 10px;border:1px solid rgba(255,255,255,0.08);}
.stat-label{font-size:9px;color:#806040;letter-spacing:1px;}
.stat-value{font-size:14px;font-weight:bold;line-height:1.2;}
.stat-sub{font-size:10px;color:#907050;margin-top:1px;}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:12px;padding-bottom:90px;}

/* BOTTOM NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#18100a;border-top:2px solid #b02818;display:flex;z-index:50;overflow-x:auto;}
.nav-btn{flex:1;min-width:52px;background:transparent;color:#907050;border:none;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Courier New',monospace;}
.nav-btn.active{background:#b02818;color:#fff;}
.nav-icon{font-size:16px;}
.nav-label{font-size:9px;letter-spacing:0.5px;}

/* SECTIONS */
.sec{margin-bottom:14px;border:1px solid #b0a080;}
.sec-title{background:#18100a;color:#f7f2e8;padding:6px 12px;font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.sec-body{padding:12px;background:#eee8d8;}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.row-label{color:#46382a;font-size:13px;}
.row-val{color:#18100a;font-weight:bold;font-size:13px;}

/* BUTTONS */
.btn{background:#b02818;color:#fff;border:1px solid #d03828;padding:6px 12px;font-size:12px;letter-spacing:0.5px;box-shadow:2px 2px 0 #18100a;}
.btn:disabled{background:#d0c8b8;color:#8a7a62;border-color:#b0a080;box-shadow:none;cursor:not-allowed;}
.btn-full{width:100%;padding:12px;font-size:13px;}
.btn-gold{background:#7a5a0c;border-color:#c89020;}
.btn-purple{background:#481468;border-color:#481468;}
.buy-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;}
.buy-info{flex:1;}
.buy-name{color:#46382a;font-size:13px;}
.buy-cost{color:#8a7a62;font-size:11px;}
.tap-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:4px;}
.tap-btn{background:#e4dcc8;color:#18100a;border:1px solid #b0a080;padding:10px 0;font-size:13px;font-weight:bold;box-shadow:1px 1px 0 #b0a080;}

/* STAMP BUTTON */
#stamp-btn{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 36% 34%,#e04030,#7a1c10);border:5px solid #18100a;color:#fff;font-size:14px;font-weight:bold;letter-spacing:1px;line-height:1.5;box-shadow:4px 4px 0 #18100a;transition:transform 0.08s,box-shadow 0.08s;display:block;margin:8px auto 6px;}
#stamp-btn:active{transform:scale(0.90) translateY(3px);box-shadow:1px 1px 0 #18100a;}
#stamp-sub{text-align:center;font-size:11px;color:#8a7a62;margin-bottom:16px;}

/* BAR */
.bar-wrap{background:#d0c8b8;border:1px solid #b0a080;height:10px;width:100%;margin-bottom:6px;}
.bar-fill{height:100%;transition:width 0.3s;}

/* LOG */
#log-inner{max-height:180px;overflow-y:auto;font-size:12px;line-height:1.7;}
.log-entry{padding-bottom:4px;margin-bottom:4px;border-bottom:1px solid #ccc0a0;color:#46382a;}
.log-star{color:#7a5a0c;}
.log-warn{color:#b02818;}
.log-phase{color:#182850;}
.log-trust{color:#481468;}

/* PROJECT CARD */
.proj-card{margin-bottom:14px;background:#f7f2e8;border:1px solid #b0a080;padding:12px;}
.proj-name{font-weight:bold;color:#18100a;font-size:14px;margin-bottom:4px;}
.proj-desc{color:#46382a;font-size:12px;margin-bottom:5px;}
.proj-flavor{color:#8a7a62;font-size:11px;font-style:italic;margin-bottom:8px;line-height:1.5;}
.proj-cost{font-size:11px;color:#8a7a62;margin-bottom:8px;}

/* STRATEGY CHIPS */
.strat-wrap{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0;}
.strat-chip{font-size:10px;background:#e4dcc8;border:1px solid #b0a080;padding:3px 7px;color:#46382a;}

/* TOURNEY RESULT */
.tourney-win{margin-top:10px;padding:10px;background:#d4f0d4;border:1px solid #1a561a;color:#1a561a;font-size:13px;text-align:center;}
.tourney-loss{margin-top:10px;padding:10px;background:#f0d4d4;border:1px solid #b02818;color:#b02818;font-size:13px;text-align:center;}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(24,16,10,0.88);display:flex;align-items:center;justify-content:center;z-index:9998;padding:20px;}
#modal-box{background:#f7f2e8;border:2px solid #7a5a0c;padding:20px;max-width:400px;width:100%;text-align:center;position:relative;}
#modal-close{position:absolute;top:8px;right:10px;background:none;border:none;color:#8a7a62;font-size:18px;line-height:1;}
.modal-icon{font-size:28px;margin-bottom:8px;}
.modal-title{font-size:15px;font-weight:bold;color:#7a5a0c;margin-bottom:10px;}
.modal-text{color:#46382a;font-size:12px;line-height:1.85;margin-bottom:14px;}
.modal-highlight{color:#18100a;font-weight:bold;}

/* ENDING */
#ending{position:fixed;inset:0;background:rgba(24,16,10,0.97);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px;flex-direction:column;text-align:center;overflow-y:auto;}
#ending-icon{font-size:50px;margin-bottom:14px;}
#ending-title{font-size:17px;font-weight:bold;letter-spacing:3px;margin-bottom:12px;}
#ending-text{font-size:13px;color:#d4c090;max-width:400px;line-height:2.1;margin-bottom:22px;}
#ending-prestige{background:linear-gradient(90deg,#7a5a0c,#c89020);color:#fff;border:none;padding:14px 28px;font-size:13px;letter-spacing:1px;margin-bottom:10px;}
#ending-sub{font-size:10px;color:#5a4828;letter-spacing:2px;}

/* HIDDEN */
.hidden{display:none!important;}

/* PHASE COLOR VARS applied via JS */
</style>
</head>

  <div id="content"></div>

  <!-- BOTTOM NAV -->
  <div id="nav">
    <button class="nav-btn active" id="nav-main" onclick="setTab('main')"><span class="nav-icon">&#x2B21;</span><span class="nav-label">Workshop</span></button>
    <button class="nav-btn hidden" id="nav-ops" onclick="setTab('ops')"><span class="nav-icon">&#x2699;</span><span class="nav-label">Computing</span></button>
    <button class="nav-btn hidden" id="nav-market" onclick="setTab('market')"><span class="nav-icon">&#x2605;</span><span class="nav-label">Market</span></button>
    <button class="nav-btn hidden" id="nav-invest" onclick="setTab('invest')"><span class="nav-icon">$</span><span class="nav-label">Portfolio</span></button>

</div>

<script>
// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function fmt(n){
  if(!isFinite(n)||n==null)return"0";
  if(n>=1e33)return n.toExponential(2);
  if(n>=1e30)return(n/1e30).toFixed(2)+" non";
  if(n>=1e27)return(n/1e27).toFixed(2)+" oct";
  if(n>=1e24)return(n/1e24).toFixed(2)+" sep";
  if(n>=1e21)return(n/1e21).toFixed(2)+" sxt";
  if(n>=1e18)return(n/1e18).toFixed(2)+" qnt";
  if(n>=1e15)return(n/1e15).toFixed(2)+" qdr";
  if(n>=1e12)return(n/1e12).toFixed(2)+" tri";
  if(n>=1e9) return(n/1e9).toFixed(2)+" bil";
  if(n>=1e6) return(n/1e6).toFixed(2)+" mil";
  if(n>=1e3) return(n/1e3).toFixed(1)+"k";
  return Math.floor(n).toLocaleString();
}
function fd(n){
  if(n>=1e12)return"$"+(n/1e12).toFixed(2)+"T";
  if(n>=1e9) return"$"+(n/1e9).toFixed(2)+"B";
  if(n>=1e6) return"$"+(n/1e6).toFixed(2)+"M";
  if(n>=1e3) return"$"+(n/1e3).toFixed(1)+"K";
  return"$"+n.toFixed(2);
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function elapsed(ms){
  const s=Math.floor(ms/1000);
  if(s<60)return s+"s";
  if(s<3600)return Math.floor(s/60)+"m "+(s%60)+"s";
  return Math.floor(s/3600)+"h "+Math.floor((s%3600)/60)+"m";
}
function el(id){return document.getElementById(id);}
function setText(id,v){const e=el(id);if(e)e.textContent=v;}
function setHTML(id,v){const e=el(id);if(e)e.innerHTML=v;}

// ═══════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════
const SAVE_KEY="capCollector_v4html";
function saveGame(){
  try{
    const s={...G};
    delete s.ticker;
    s.savedAt=Date.now();
    localStorage.setItem(SAVE_KEY,JSON.stringify(s));
  }catch(e){}
}
function loadGame(){
  try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}
  catch(e){return null;}
}
function deleteSave(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}

// ═══════════════════════════════════════
// OFFLINE PROGRESS
// ═══════════════════════════════════════
function calcOffline(saved){
  if(!saved||!saved.savedAt)return null;
  const ms=Math.min(Date.now()-saved.savedAt,8*3600000);
  if(ms<5000)return null;
  const ticks=ms/100;
  const cps=(saved.autoStampers||0)*0.30*(saved.autoStamperBoost||1)*0.8;
  const probeH=(saved.phase>=3)?(saved.probes||0)*(saved.probeSpeed||1)*0.0004*ticks*80000*0.8:0;
  const factH=(saved.phase>=2)?(saved.factories||0)*20*(saved.factoryBoost||1)*(1+(saved.unionLevel||0))*ticks*0.1*0.8:0;
  const capsMade=cps*ticks*0.1+probeH+factH;
  const demMod=clamp(1-((saved.price||0.25)-0.10)*1.5,0,1);
  const sold=Math.min(capsMade*0.6,(saved.demand||3)*demMod*0.15*ticks);
  const funds=sold*(saved.price||0.25);
  return{ms,caps:Math.floor(capsMade),funds:Math.floor(funds*100)/100};
}

// ═══════════════════════════════════════
// INITIAL STATE
// ═══════════════════════════════════════
function makeInit(legacy){
  legacy=legacy||0;
  const lm=1+legacy*0.20;
  return{
    legacy,legacyMult:lm,phase:1,ticker:0,savedAt:Date.now(),
    caps:0,totalCaps:0,
    funds:3.50*lm,wire:1000,wireCost:Math.max(0.40,1.75-legacy*0.08),
    capsPerClick:Math.max(1,legacy),
    autoStampers:0,autoStamperCost:60,autoStamperBoost:1+legacy*0.12,
    price:0.25,demand:3+legacy,marketingLevel:0,
    opsUnlocked:false,processors:1,memory:1,ops:0,maxOps:100,creativity:0,trust:2,maxTrust:2,
    factories:0,factoryCost:50000,factoryBoost:1,workers:0,workerCost:5000,unionLevel:0,
    marketUnlocked:false,investUnlocked:false,factoryTabUnlocked:false,
    spaceUnlocked:false,cosmicUnlocked:false,ledgerUnlocked:false,
    yomi:0,honor:0,investments:0,portfolioValue:0,
    megaWarehouseDone:false,megaCorpDone:false,galacticMergerDone:false,
    probesUnlocked:false,probes:0,probeSpeed:1,probeReplication:1,probeHazard:1,probeCombat:1,
    acquiredMatter:0,drifterThreat:0,universeMatter:1e36,drifterTruceActive:false,
    swarmCoherence:100,coherenceEngineDone:false,
    darkMatterUnlocked:false,darkMatter:0,darkMatterForgeActive:false,universalPatent:false,
    grandTradeUnlocked:false,endingChosen:false,endingType:null,
    autoBuyWire:false,completedProjects:[],milestonesSeen:[],
    log:legacy===0
      ?["You're in your garage. One hand-stamp. One dream. Make bottle caps."]
      :["Legacy Run #"+(legacy+1)+". The muscle memory returns immediately."]
  };
}

// GAME STATE
// ═══════════════════════════════════════
let G;
let currentTab="main";
let saveFlashTimer=null;
let seenMilestones=new Set();
let tourneyRunning=false;

(function init(){
  const saved=loadGame();
  const offline=calcOffline(saved);
  G=saved?Object.assign(makeInit(saved.legacy||0),saved):makeInit(0);
  G.ticker=0;
  if(saved&&saved.milestonesSeen) saved.milestonesSeen.forEach(m=>seenMilestones.add(m));
  if(offline&&saved){
    G.caps=(G.caps||0)+offline.caps;
    G.totalCaps=(G.totalCaps||0)+offline.caps;
    G.funds=(G.funds||0)+offline.funds;
    setTimeout(()=>showOfflineModal(offline),500);
  }
  renderAll();
  setInterval(tick,100);
  setInterval(()=>{saveGame();showSaveFlash();},15000);
})();

// ═══════════════════════════════════════
// TICK
// ═══════════════════════════════════════
function tick(){
  G.ticker=(G.ticker||0)+1;
  const t=G.ticker;

  // Ops
  if(G.opsUnlocked){
    G.maxOps=G.memory*100;
    G.ops=Math.min(G.maxOps,G.ops+G.processors*0.10);
    if(G.ops>=G.maxOps)G.creativity+=G.processors*0.004;
  }

  // AutoStampers
  if(G.autoStampers>0&&G.wire>0){
    const prod=G.autoStampers*0.30*G.autoStamperBoost*0.1;
    G.caps+=prod; G.totalCaps+=prod;
    G.wire=Math.max(0,G.wire-prod*0.0008);
  }

  // Factories (Phase 2)
  if(G.phase>=2&&G.factories>0){
    const uBonus=1+(G.unionLevel||0);
    const wBonus=1+(G.workers||0)*0.05;
    const fprod=G.factories*20*G.factoryBoost*uBonus*wBonus*0.1;
    G.caps+=fprod; G.totalCaps+=fprod;
  }

  // Auto-wire
  if(G.autoBuyWire&&G.wire<400&&G.funds>=G.wireCost){
    G.wire+=250; G.funds-=G.wireCost;
  }

  // Sell
  const demMod=clamp(1-(G.price-0.10)*1.5,0,1);
  const sold=Math.min(G.caps,G.demand*demMod*0.15);
  G.caps-=sold;
  G.funds+=sold*G.price*(G.universalPatent?6:1);

  // Portfolio
  if(G.investUnlocked&&G.portfolioValue>0){
    G.portfolioValue*=1.00012;
    if(t%25===0)G.funds+=G.portfolioValue*0.0005;
  }

  // Probes (Phase 3)
  if(G.phase>=3&&G.probes>0){
    const harvest=G.probes*G.probeSpeed*0.0004;
    G.acquiredMatter+=harvest;
    G.universeMatter=Math.max(0,G.universeMatter-harvest);
    if(G.acquiredMatter>=100){
      const gain=G.acquiredMatter*80000;
      G.caps+=gain; G.totalCaps+=gain; G.acquiredMatter=0;
    }
    if(t%20===0) G.probes=Math.floor(G.probes*(1+G.probeReplication*0.0008));
    const tRate=G.drifterTruceActive?0.00015:0.0004;
    G.drifterThreat+=tRate;
    if(G.drifterThreat>=1){
      const loss=Math.max(1,Math.floor(G.probes*0.05/G.probeHazard));
      G.probes=Math.max(0,G.probes-loss);
      G.drifterThreat=0;
      addLog("⚠ Drifters attack! Lost "+fmt(loss)+" probes.","warn");
    }
  }

  // Dark matter (Phase 4)
  if(G.darkMatterUnlocked&&G.probes>0){
    G.darkMatter=(G.darkMatter||0)+G.probes*0.00001;
  }
  if(G.darkMatterForgeActive&&(G.darkMatter||0)>=1){
    const dmCaps=G.darkMatter*1e12;
    G.caps+=dmCaps; G.totalCaps+=dmCaps; G.darkMatter=0;
  }

  // Swarm coherence (Phase 4)
  if(G.phase>=4){
    const decay=G.coherenceEngineDone?0.00006:0.0005;
    G.swarmCoherence=Math.max(0,G.swarmCoherence-decay);
  }

  // Trust
  const tThresh=[500,5000,50000,5e5,5e6,5e7,5e8,5e9,5e10,5e12,5e15,5e18,5e21];
  const earned=2+tThresh.filter(x=>G.totalCaps>=x).length;
  if(earned>G.maxTrust){
    G.trust+=earned-G.maxTrust; G.maxTrust=earned;
    addLog("✦ Trust increased — expand your operation.","trust");
  }

  // Unlock ops
  if(!G.opsUnlocked&&G.autoStampers>=1){
    G.opsUnlocked=true;
    addLog("You wire up a simple computer. A new tab appears.","");
    showNav("ops");
  }

  // Phase transitions
  if(G.phase===1&&G.megaWarehouseDone&&G.totalCaps>=2e6){
    G.phase=2; G.factoryTabUnlocked=true;
    addLog("— PHASE 2: INDUSTRIAL AGE — The warehouse is open.","phase");
    showNav("factory"); updatePhaseColor();
  }
  if(G.phase===2&&G.megaCorpDone&&G.totalCaps>=5e9){
    G.phase=3; G.spaceUnlocked=true;
    addLog("— PHASE 3: GALACTIC EXPANSION — The stars await.","phase");
    showNav("space"); updatePhaseColor();
  }
  if(G.phase===3&&G.galacticMergerDone&&G.totalCaps>=1e18){
    G.phase=4; G.cosmicUnlocked=true;
    addLog("— PHASE 4: UNIVERSAL DOMINION — The universe is a subsidiary.","phase");
    showNav("cosmic"); updatePhaseColor();
  }
  if(G.phase===4&&G.totalCaps>=1e30){
    G.phase=5; G.ledgerUnlocked=true;
    addLog("— PHASE 5: THE FINAL LEDGER — The universe wants to talk.","phase");
    showNav("ledger"); updatePhaseColor();
  }

  // Milestones
  for(const m of MILESTONES){
    if(!seenMilestones.has(m.at)&&G.totalCaps>=m.at){
      seenMilestones.add(m.at);
      G.milestonesSeen=[...(G.milestonesSeen||[]),m.at];
      addLog("★ "+m.msg,"star");
    }
  }

  // Update header every tick
  updateHeader();
  // Update tab content every 2 ticks (5 fps for content)
  if(t%2===0) renderTab();
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function updateHeader(){
  const cps=G.autoStampers*0.30*G.autoStamperBoost;
  const fps=G.phase>=2?G.factories*20*G.factoryBoost*(1+(G.unionLevel||0))*(1+(G.workers||0)*0.05):0;
  setText("s-caps",fmt(G.caps));
  setText("s-cps",(cps+fps).toFixed(1)+" /s");
  setText("s-total",fmt(G.totalCaps));
  setText("s-phase","Phase "+G.phase);
  setText("s-funds",fd(G.funds));
  setText("s-pf",G.investUnlocked?"Pf: "+fd(G.portfolioValue):"");
  setText("s-wire",fmt(G.wire));
  setText("s-fps",G.phase>=2?fmt(fps)+" /s":"");
}

function updatePhaseColor(){
  const col=PHASE_COLORS[Math.min(G.phase-1,PHASE_COLORS.length-1)];
  el("header").style.borderBottomColor=col;
  el("nav").style.borderTopColor=col;
  setText("phase-name",PHASE_NAMES[G.phase]||"");
  document.querySelectorAll(".nav-btn.active").forEach(b=>b.style.background=col);
  // active nav btn
  const ab=el("nav-"+currentTab);
  if(ab){ab.style.background=col;}
}

function showNav(id){
  const btn=el("nav-"+id);
  if(btn)btn.classList.remove("hidden");
}

function setTab(id){
  currentTab=id;
  document.querySelectorAll(".nav-btn").forEach(b=>{
    b.classList.remove("active");
    b.style.background="";
  });
  const col=PHASE_COLORS[Math.min(G.phase-1,PHASE_COLORS.length-1)];
  const btn=el("nav-"+id);
  if(btn){btn.classList.add("active");btn.style.background=col;}
  renderTab();
}

function renderAll(){
  updateHeader();
  updatePhaseColor();
  // Show tabs that should be visible
  if(G.opsUnlocked)    showNav("ops");
  if(G.marketUnlocked) showNav("market");
  if(G.investUnlocked) showNav("invest");
  if(G.factoryTabUnlocked) showNav("factory");
  if(G.spaceUnlocked)  showNav("space");
  if(G.cosmicUnlocked) showNav("cosmic");
  if(G.ledgerUnlocked) showNav("ledger");
  if(G.endingChosen)   showNav("prestige");
  renderTab();
  renderLog();
}

function renderTab(){
  const c=el("content");
  if(!c)return;
  let html="";
  if(currentTab==="main")    html=renderWorkshop();
  else if(currentTab==="ops")     html=renderComputing();
  else if(currentTab==="market")  html=renderMarket();
  else if(currentTab==="invest")  html=renderInvest();
  else if(currentTab==="factory") html=renderFactory();
  else if(currentTab==="space")   html=renderSpace();
  else if(currentTab==="cosmic")  html=renderCosmic();
  else if(currentTab==="ledger")  html=renderLedger();
  html+=renderLogSection();
  c.innerHTML=html;
  attachListeners();
}

// ─── TAB HTML ───
function sec(title,body){return`<div class="sec"><div class="sec-title">${title}</div><div class="sec-body">${body}</div></div>`;}
function row(label,val){return`<div class="row"><span class="row-label">${label}</span><span class="row-val">${val}</span></div>`;}
function bar(val,max,col){const p=clamp((val/max)*100,0,100);return`<div class="bar-wrap"><div class="bar-fill" style="width:${p}%;background:${col}"></div></div>`;}
function btn(label,fn,disabled,extra){return`<button class="btn${extra?(' '+extra):''}"${disabled?' disabled':''} onclick="${fn}">${label}</button>`;}
function buyRow(label,count,cost,fn,disabled){
  const c=count!==undefined?` <span style="color:#8a7a62">[${count}]</span>`:"";
  return`<div class="buy-row"><div class="buy-info"><div class="buy-name">${label}${c}</div><div class="buy-cost">${cost}</div></div>${btn("Buy",fn,disabled)}</div>`;
}

  const progHTML=!G.ledgerUnlocked?`
    ${sec("Path to Phase 5",`
      <p style="color:#8a7a62;font-size:12px;line-height:1.7;margin-bottom:8px">Reach 1 nonillion caps (1e30) to unlock The Final Ledger.</p>
      ${bar(Math.log10(Math.max(1,G.totalCaps)),30,"#481468")}
      <div style="font-size:11px;color:#8a7a62;margin-top:4px">${logScale} / 30 (log scale)</div>
    `)}`:""
  ;
  const coCol=G.swarmCoherence>60?"#1a561a":G.swarmCoherence>30?"#7a5a0c":"#b02818";
  return sec("Universal Dominion",`
    ${row("Total Caps",fmt(G.totalCaps))}
    ${row("Honor",fmt(G.honor))}
    ${row("Dark Matter",fmt(G.darkMatter||0))}
    <div style="font-size:11px;color:#8a7a62;margin-bottom:3px">Swarm Coherence ${G.coherenceEngineDone?"(ENGINE ONLINE)":""}</div>
    ${bar(G.swarmCoherence,100,coCol)}
    <div style="font-size:11px;color:#8a7a62;margin-top:2px">${G.swarmCoherence.toFixed(1)}%</div>
    <p style="color:#46382a;font-size:12px;line-height:1.7;margin-top:10px">${G.totalCaps>=1e27?"The universe runs on fumes. Every atom has been weighed against its cap-worthiness.":"Your swarm drifts between dead stars, converting matter into caps."}</p>
  `)+progHTML;
}

function renderLedger(){
  const endBtns=G.grandTradeUnlocked&&!G.endingChosen?`
    ${btn("&#x2605; Accept the Trade","chooseEnding('trade')",false,"btn-full btn-purple")} 
    <div style="height:10px"></div>
    ${btn("&#x221E; Keep the Caps","chooseEnding('keep')",false,"btn-full")}
  `:`<p style="color:#8a7a62;font-size:12px;line-height:1.7">${G.endingChosen?"Your choice has been made.":"Research \"The Grand Trade\" in Computing. Requires 5,000 Honor."}</p>`;
  return sec("&#x2605; THE FINAL LEDGER",`
    <p style="color:#18100a;font-size:13px;line-height:1.9;margin-bottom:14px">
      You have stamped more bottle caps than atoms in the known universe.<br><br>
      The universe — ancient, patient, watching — has finally noticed. It clears its throat.<br><br>
      It offers a trade: <strong>every cap back</strong>. Every. Last. One.<br><br>
      In return: <strong style="color:#481468">something that cannot be stamped, sorted, or sold.</strong>
    </p>
    ${endBtns}
  `);
}

function renderLogSection(){
  const entries=G.log.slice(-30).map(e=>{
    let cls="log-entry";
    if(e.startsWith("★"))cls+=" log-star";
    else if(e.startsWith("⚠"))cls+=" log-warn";
    else if(e.startsWith("—"))cls+=" log-phase";
    else if(e.startsWith("✦"))cls+=" log-trust";
    return`<div class="${cls}">${e}</div>`;
  }).join("");
  return sec("&#x25B8; Collector's Log",`<div id="log-inner">${entries}</div>`);
}

function renderLog(){
  const li=el("log-inner");
  if(!li)return;
  const entries=G.log.slice(-30).map(e=>{
    let cls="log-entry";
    if(e.startsWith("★"))cls+=" log-star";
    else if(e.startsWith("⚠"))cls+=" log-warn";
    else if(e.startsWith("—"))cls+=" log-phase";
    else if(e.startsWith("✦"))cls+=" log-trust";
    return`<div class="${cls}">${e}</div>`;
  }).join("");
  li.innerHTML=entries;
  li.scrollTop=li.scrollHeight;
}

function addLog(msg,type){
  G.log=[...G.log.slice(-99),msg];
  renderLog();
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function stampCap(){
  if(G.wire<1){addLog("Out of aluminum! Buy more wire.","");return;}
  G.caps+=G.capsPerClick; G.totalCaps+=G.capsPerClick; G.wire-=1;
}
function buyWire(){if(G.funds>=G.wireCost){G.wire+=250;G.funds-=G.wireCost;}}
function adjPrice(d){G.price=Math.max(0.01,Math.round((G.price+d)*100)/100);}
function buyStamper(){if(G.funds>=G.autoStamperCost){G.autoStampers++;G.funds-=G.autoStamperCost;G.autoStamperCost=Math.ceil(G.autoStamperCost*1.15);}}
function buyMarketing(){const cost=Math.pow(2.2,G.marketingLevel+1)*50;if(G.funds>=cost){G.marketingLevel++;G.demand+=4;G.funds-=cost;G.marketUnlocked=true;showNav("market");}}
function addProcessor(){if(G.trust>=1){G.processors++;G.trust--;}}
function addMemory(){if(G.trust>=1){G.memory++;G.trust--;}}
function buyFactory(){if(G.funds>=G.factoryCost){G.factories++;G.funds-=G.factoryCost;G.factoryCost=Math.ceil(G.factoryCost*1.18);}}
function buyWorker(){if(G.funds>=G.workerCost){G.workers=(G.workers||0)+1;G.funds-=G.workerCost;G.workerCost=Math.ceil(G.workerCost*1.10);}}
function investFunds(){if(G.funds>=1000){const a=Math.floor(G.funds*0.25);G.funds-=a;G.investments+=a;G.portfolioValue+=a;}}
function buyProbe(){const cost=Math.floor(1e6*Math.pow(1.10,G.probes));if(G.probesUnlocked&&G.funds>=cost){G.probes++;G.funds-=cost;}}
function upgradeProbe(key){const cost=Math.max(100000,G.funds*0.07);if(G.funds>=cost){G[key]++;G.funds-=cost;}}

function doProject(visibleIndex){
  const visProj=PROJECTS.filter(p=>!G.completedProjects.includes(p.id)&&p.unlockFn(G));
  const p=visProj[visibleIndex];
  if(!p)return;
  if(G.ops<p.opsReq){addLog("Need "+fmt(p.opsReq)+" ops.","");return;}
  if(G.creativity<p.creatReq){addLog("Need "+fmt(p.creatReq)+" creativity.","");return;}
  if(G.funds<p.fundsReq){addLog("Need "+fd(p.fundsReq)+".","");return;}
  G.ops-=p.opsReq; G.creativity-=p.creatReq; G.funds-=p.fundsReq;
  p.effect(G);
  G.completedProjects.push(p.id);
  addLog(p.msg,"");
  // Check if new tabs should show
  if(G.marketUnlocked)showNav("market");
  if(G.investUnlocked)showNav("invest");
}

function runTourney(){
  if(tourneyRunning)return;
  tourneyRunning=true;
  window._tourneyResult=null;
  renderTab();
  setTimeout(()=>{
    const win=Math.random()>0.42;
    const yomi=win?Math.floor(80+Math.random()*300):Math.floor(20+Math.random()*80);
    window._tourneyResult={win,yomi};
    G.yomi+=yomi;
    if(win)G.honor+=25;
    addLog(win?"★ Tournament WIN — +"+yomi+" Yomi":"✗ Tournament loss — +"+yomi+" Yomi","");
    tourneyRunning=false;
    renderTab();
  },1800);
}

function chooseEnding(type){
  deleteSave();
  G.endingChosen=true; G.endingType=type;
  showNav("prestige");
  // Show ending screen
  el("ending").classList.remove("hidden");
  el("ending-icon").textContent=type==="trade"?"✦":"⬡";
  el("ending-title").textContent=type==="trade"?"THE GRAND TRADE":"THE ETERNAL COLLECTION";
  el("ending-title").style.color=type==="trade"?"#c090ff":"#ff8060";
  setHTML("ending-text",type==="trade"
    ?`You made <strong style="color:#f5e8c0">${fmt(G.totalCaps)}</strong> bottle caps.<br>You traded every last one back to the universe.<br><br>In the silence after the exchange, something arrived that no garage, shelf, or catalogue could ever hold.<br><br><em style="color:#c090ff">The collection was never the point. You were.</em>`
    :`You made <strong style="color:#f5e8c0">${fmt(G.totalCaps)}</strong> bottle caps.<br>You kept every last one.<br><br>The universe is yours — cold, catalogued, complete. A monument to one obsession.<br><br><em style="color:#ff8060">The collection is everything. And everything is the collection.</em>`
  );
  el("ending-prestige").textContent="★ Begin Legacy Run #"+(G.legacy+1);
}

function showOfflineModal(offline){
  setHTML("modal-content",`
    <div class="modal-icon">&#x23F0;</div>
    <div class="modal-title">Welcome Back!</div>
    <div class="modal-text">You were away for <span class="modal-highlight">${elapsed(offline.ms)}</span>.<br>Your operation kept running at 80% efficiency:</div>
    <div style="background:#e4dcc8;border:1px solid #b0a080;padding:10px;margin-bottom:14px;font-size:13px">
      <div class="row"><span class="row-label">Caps produced:</span><strong>${fmt(offline.caps)}</strong></div>
      <div class="row"><span class="row-label">Funds earned:</span><strong style="color:#1a561a">${fd(offline.funds)}</strong></div>
    </div>
    <button class="btn btn-full" onclick="closeModal()">Collect &amp; Continue</button>
  `);
  el("modal-overlay").classList.remove("hidden");
}

function showPrestigeModal(){
  setHTML("modal-content",`
    <div class="modal-icon">&#x2B21;</div>
    <div class="modal-title">BEGIN LEGACY RUN #${(G.legacy||0)+1}</div>
    <div class="modal-text">You collected <span class="modal-highlight">${fmt(G.totalCaps)}</span> caps this run.<br><br>Legacy Bonuses carry forward:<br>+20% stamper output &bull; +1 base demand<br>Cheaper wire &bull; Higher starting funds<br>+${(G.legacy||0)+1} caps per click base</div>
    <button class="btn btn-gold btn-full" style="padding:12px;margin-bottom:8px" onclick="doPrestige()">&#x2605; Start Legacy Run #${(G.legacy||0)+1}</button>
    <button class="btn btn-full" style="background:#d0c8b8;color:#46382a;border-color:#b0a080;box-shadow:none" onclick="closeModal()">Cancel</button>
  `);
  el("modal-overlay").classList.remove("hidden");
}

function closeModal(){el("modal-overlay").classList.add("hidden");}

function doPrestige(){
  deleteSave();
  seenMilestones=new Set();
  window._tourneyResult=null;
  G=makeInit((G.legacy||0)+1);
  saveGame();
  closeModal();
  el("ending").classList.add("hidden");
  // Hide tabs
  ["ops","market","invest","factory","space","cosmic","ledger","prestige"].forEach(id=>{
    const b=el("nav-"+id);
    if(b){b.classList.add("hidden");b.classList.remove("active");}
  });
  setTab("main");
  renderAll();
}

function manualSave(){saveGame();showSaveFlash();}
function showSaveFlash(){
  const b=el("save-btn");
  if(!b)return;
  b.textContent="✓";
  b.style.color="#88ee88";b.style.borderColor="#88ee88";
  clearTimeout(saveFlashTimer);
  saveFlashTimer=setTimeout(()=>{b.textContent="💾";b.style.color="#8a7a62";b.style.borderColor="#8a7a62";},1500);
}
function hardReset(){
  if(!confirm("Reset ALL progress including Legacy runs?"))return;
  deleteSave(); seenMilestones=new Set(); window._tourneyResult=null;
  G=makeInit(0);
  el("ending").classList.add("hidden");
  ["ops","market","invest","factory","space","cosmic","ledger","prestige"].forEach(id=>{
    const b=el("nav-"+id);
    if(b){b.classList.add("hidden");b.classList.remove("active");}
  });
  setTab("main");
  renderAll();
}
</script>
